name: Auto-close external PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  close-external-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close PR if author is not a collaborator
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            try {
              const { data: permissionLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: author,
              });

              const allowed = ['admin', 'write'];
              if (allowed.includes(permissionLevel.permission)) {
                console.log(`${author} has ${permissionLevel.permission} access. Allowing PR.`);
                return;
              }
            } catch (error) {
              console.log(`Could not check permissions for ${author}: ${error.message}`);
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: 'Thank you for your interest, but this repository is not accepting external contributions. This PR has been automatically closed.',
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              state: 'closed',
            });

            console.log(`Closed PR #${prNumber} from external user ${author}.`);
